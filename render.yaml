# Render.com — Blueprint (optional, ein Klick Deploy)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: kaplan-solutions
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: COMPANY_WEBSITE
        value: https://kaplan-solutions.de
      # Diese Werte im Render-Dashboard setzen (Secret):
      # ADMIN_EMAIL, SMTP_USER, SMTP_PASS, FROM_EMAIL, REPLY_EMAIL
      # COMPANY_OPERATOR, COMPANY_STREET, COMPANY_ZIP, COMPANY_CITY, COMPANY_PHONE
