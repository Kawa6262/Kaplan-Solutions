<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>{% block title %}Kaplan Solutions{% endblock %}</title>
    <style>
        @page { margin: 22mm 18mm; size: A4; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Helvetica Neue", Arial, Helvetica, sans-serif;
            font-size: 11pt;
            line-height: 1.55;
            color: #1a1a1a;
            background: #f4f4f4;
        }
        .no-print {
            background: #0b3d2e;
            color: #fff;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }
        .no-print a { color: #d9b75a; }
        .no-print button {
            background: #b87333;
            color: #fff;
            border: none;
            padding: 10px 18px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 2px;
        }
        .contract {
            max-width: 210mm;
            margin: 24px auto;
            background: #fff;
            padding: 22mm 18mm;
            box-shadow: 0 2px 24px rgba(0,0,0,.08);
        }
        .brand-bar {
            border-bottom: 3px solid #b87333;
            padding-bottom: 14px;
            margin-bottom: 28px;
        }
        .brand-bar .brand {
            font-size: 9pt;
            letter-spacing: .35em;
            text-transform: uppercase;
            color: #b87333;
            margin: 0 0 6px;
        }
        .brand-bar h1 {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 22pt;
            font-weight: 400;
            margin: 0;
            color: #0b3d2e;
        }
        .brand-bar .sub {
            margin: 8px 0 0;
            font-size: 10pt;
            color: #666;
        }
        .notice {
            background: #faf6f0;
            border-left: 3px solid #b87333;
            padding: 12px 16px;
            margin-bottom: 28px;
            font-size: 10pt;
            color: #444;
        }
        h2 {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 13pt;
            color: #0b3d2e;
            margin: 28px 0 10px;
            page-break-after: avoid;
        }
        h2:first-of-type { margin-top: 0; }
        p { margin: 0 0 10px; }
        ol, ul { margin: 0 0 12px; padding-left: 22px; }
        li { margin-bottom: 6px; }
        .party-box {
            border: 1px solid #ddd;
            padding: 14px 16px;
            margin-bottom: 14px;
            background: #fafafa;
        }
        .party-box strong { color: #0b3d2e; }
        .fill-line {
            border-bottom: 1px solid #999;
            min-height: 22px;
            margin: 6px 0 12px;
        }
        .checkbox-line { margin: 6px 0; }
        .checkbox {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 1px solid #333;
            margin-right: 8px;
            vertical-align: middle;
        }
        table.meta {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0 20px;
            font-size: 10pt;
        }
        table.meta td {
            border: 1px solid #ddd;
            padding: 8px 10px;
            vertical-align: top;
        }
        table.meta td:first-child {
            width: 38%;
            background: #f7f7f7;
            color: #555;
        }
        .signatures {
            margin-top: 36px;
            page-break-inside: avoid;
        }
        .sig-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 24px;
        }
        .sig-block .fill-line { margin-top: 48px; }
        .sig-label { font-size: 9pt; color: #666; }
        .footer-note {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid #eee;
            font-size: 9pt;
            color: #888;
        }
        @media print {
            body { background: #fff; }
            .no-print { display: none !important; }
            .contract {
                margin: 0;
                box-shadow: none;
                padding: 0;
                max-width: none;
            }
            h2 { page-break-after: avoid; }
            .signatures { page-break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div class="no-print">
        <span><strong>Kaplan Solutions</strong> — Vertragsvorlage · Stand {{ updated }}</span>
        <div>
            <a href="/vermittlungsvertrag">Übersicht</a>
            &nbsp;·&nbsp;
            <button type="button" onclick="window.print()">Als PDF drucken / speichern</button>
        </div>
    </div>
    <article class="contract">
        {% block contract %}{% endblock %}
    </article>
</body>
</html>
